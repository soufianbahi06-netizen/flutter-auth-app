name: flutter_auth_app
description: Flutter Authentication App with Google Sign-In and Claude AI Integration.
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_sign_in: ^6.1.0
  firebase_auth: ^5.5.0
  firebase_core: ^3.0.0
  http: ^1.1.0
  flutter_secure_storage: ^9.0.0
  provider: ^6.0.0
  dio: ^5.3.0
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true